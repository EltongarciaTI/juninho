<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produtos — Juninho Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div style="font-size:28px">👑</div>
        <div class="sidebar-logo-text"><span>Juninho</span><span>Multi Marcas</span></div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <span class="nav-section-label">Principal</span>
      <a href="dashboard.html" class="nav-link"><span class="nav-icon">📊</span> Dashboard</a>
      <a href="pedidos.html" class="nav-link"><span class="nav-icon">📦</span> Pedidos</a>
      <a href="vendas.html" class="nav-link"><span class="nav-icon">📝</span> Anotar Venda</a>
      <span class="nav-section-label">Catálogo</span>
      <a href="produtos.html" class="nav-link active"><span class="nav-icon">👕</span> Produtos</a>
      <a href="promocoes.html" class="nav-link"><span class="nav-icon">🔥</span> Promoções</a>
      <span class="nav-section-label">Relatórios</span>
      <a href="relatorios.html" class="nav-link"><span class="nav-icon">📈</span> Relatórios</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user" onclick="logout()">
        <div class="user-avatar">J</div>
        <div class="user-info"><div class="user-name">Administrador</div><div class="user-role">Sair ↗</div></div>
      </div>
    </div>
  </aside>

  <main class="admin-main">
    <div class="topbar">
      <button class="topbar-menu-btn" id="topbarMenuBtn">☰</button>
      <span class="topbar-title">Produtos</span>
      <div class="topbar-actions">
        <a href="../index.html" target="_blank" class="store-link">🛍️ Ver Loja</a>
        <button class="btn topbar-btn primary" onclick="openProductModal()">+ Novo Produto</button>
      </div>
    </div>

    <div class="content">
      <!-- Filters -->
      <div style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap">
        <div class="search-bar" style="flex:1;min-width:200px">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" placeholder="Buscar produto..." oninput="filterProducts()">
        </div>
        <select class="form-select" id="categoryFilter" onchange="filterProducts()" style="width:160px">
          <option value="">Todas as categorias</option>
        </select>
        <select class="form-select" id="statusFilter" onchange="filterProducts()" style="width:140px">
          <option value="">Todos</option>
          <option value="active">Ativos</option>
          <option value="inactive">Inativos</option>
          <option value="promo">Em Promoção</option>
        </select>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Produto</th>
              <th>Categoria</th>
              <th>Marca</th>
              <th>Preço</th>
              <th>Estoque</th>
              <th>Status</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="productsTable">
            <tr><td colspan="7" style="text-align:center;padding:40px;color:var(--gray-500)">Carregando...</td></tr>
          </tbody>
        </table>
      </div>
      <div class="pagination" id="pagination"></div>
    </div>
  </main>
</div>

<!-- MODAL PRODUTO -->
<div class="modal-overlay" id="productModal">
  <div class="modal" style="max-width:640px">
    <div class="modal-head">
      <h3 id="modalTitle">Novo Produto</h3>
      <button class="btn-icon" onclick="closeProductModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="productId">
      <div class="form-grid">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Nome do Produto *</label>
            <input type="text" class="form-input" id="pName" placeholder="Ex: Camiseta Nike Dry Fit">
          </div>
          <div class="form-group">
            <label class="form-label">Marca *</label>
            <select class="form-select" id="pBrand"></select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Categoria *</label>
            <select class="form-select" id="pCategory"></select>
          </div>
          <div class="form-group">
            <label class="form-label">Estoque</label>
            <input type="number" class="form-input" id="pStock" placeholder="0" min="0">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Preço (R$) *</label>
            <input type="number" class="form-input" id="pPrice" placeholder="0.00" step="0.01">
          </div>
          <div class="form-group">
            <label class="form-label">Preço Original (antes do desconto)</label>
            <input type="number" class="form-input" id="pOrigPrice" placeholder="0.00" step="0.01">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Descrição</label>
          <textarea class="form-input" id="pDescription" placeholder="Descreva o produto..."></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Tamanhos disponíveis (separados por vírgula)</label>
          <input type="text" class="form-input" id="pSizes" placeholder="P, M, G, GG, 38, 40, 42...">
        </div>
        <div class="form-group">
          <label class="form-label">URL das Imagens (uma por linha)</label>
          <textarea class="form-input" id="pImages" placeholder="https://link-da-imagem.com/foto1.jpg" style="min-height:80px"></textarea>
        </div>
        <div style="display:flex;gap:24px">
          <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:13px">
            <label class="toggle"><input type="checkbox" id="pFeatured"><span class="toggle-slider"></span></label>
            Lançamento / Destaque
          </label>
          <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:13px">
            <label class="toggle"><input type="checkbox" id="pPromo"><span class="toggle-slider"></span></label>
            Em Promoção
          </label>
          <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:13px">
            <label class="toggle"><input type="checkbox" id="pActive" checked><span class="toggle-slider"></span></label>
            Ativo
          </label>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeProductModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveProduct()">💾 Salvar Produto</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/admin/auth.js"></script>
<script>
let allProducts = [];
let categories = [];
let brands = [];
let currentPage = 1;
const PER_PAGE = 15;

async function init() {
  const [{ data: cats }, { data: brs }] = await Promise.all([
    db.from('categories').select('*').order('name'),
    db.from('brands').select('*').order('name')
  ]);
  categories = cats || [];
  brands = brs || [];

  const catFilter = document.getElementById('categoryFilter');
  categories.forEach(c => catFilter.innerHTML += `<option value="${c.id}">${c.name}</option>`);

  await loadProducts();
}

async function loadProducts() {
  const { data } = await db.from('products')
    .select('*, categories(name), brands(name)')
    .order('created_at', { ascending: false });
  allProducts = data || [];
  renderProducts();
  populateModalSelects();
}

function filterProducts() {
  currentPage = 1;
  renderProducts();
}

function renderProducts() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const catFilter = document.getElementById('categoryFilter').value;
  const statusFilter = document.getElementById('statusFilter').value;

  let filtered = allProducts.filter(p => {
    const matchSearch = !search || p.name.toLowerCase().includes(search) || p.brands?.name?.toLowerCase().includes(search);
    const matchCat = !catFilter || p.category_id === catFilter;
    const matchStatus = !statusFilter ||
      (statusFilter === 'active' && p.is_active) ||
      (statusFilter === 'inactive' && !p.is_active) ||
      (statusFilter === 'promo' && p.is_promotion);
    return matchSearch && matchCat && matchStatus;
  });

  const total = filtered.length;
  const start = (currentPage - 1) * PER_PAGE;
  const page = filtered.slice(start, start + PER_PAGE);

  const tbody = document.getElementById('productsTable');
  if (page.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--gray-500)">Nenhum produto encontrado</td></tr>';
    return;
  }

  tbody.innerHTML = page.map(p => `
    <tr>
      <td>
        <div class="td-product">
          <div class="td-product-img">${p.images?.[0] ? `<img src="${p.images[0]}" alt="${p.name}">` : '👕'}</div>
          <div>
            <div class="td-product-name">${p.name}</div>
            ${p.is_featured ? '<span style="font-size:9px;background:rgba(201,168,76,0.15);color:var(--gold);padding:2px 6px;border-radius:4px">NOVO</span>' : ''}
            ${p.is_promotion ? '<span style="font-size:9px;background:rgba(231,76,60,0.1);color:var(--danger);padding:2px 6px;border-radius:4px;margin-left:4px">PROMO</span>' : ''}
          </div>
        </div>
      </td>
      <td style="font-size:12px;color:var(--gray-300)">${p.categories?.name || '—'}</td>
      <td style="font-size:12px;color:var(--gold);font-weight:700">${p.brands?.name || '—'}</td>
      <td>
        <div style="font-size:14px;font-weight:800">R$ ${Number(p.price).toFixed(2)}</div>
        ${p.original_price ? `<div style="font-size:11px;color:var(--gray-400);text-decoration:line-through">R$ ${Number(p.original_price).toFixed(2)}</div>` : ''}
      </td>
      <td>
        <span style="font-size:14px;font-weight:700;color:${p.stock <= 3 ? 'var(--danger)' : p.stock <= 10 ? 'var(--warning)' : 'var(--success)'}">${p.stock}</span>
      </td>
      <td><span class="status ${p.is_active ? 'status-delivered' : 'status-cancelled'}">${p.is_active ? 'Ativo' : 'Inativo'}</span></td>
      <td>
        <div style="display:flex;gap:6px">
          <button class="btn btn-sm btn-secondary" onclick="editProduct('${p.id}')">✏️</button>
          <button class="btn btn-sm btn-danger" onclick="deleteProduct('${p.id}','${p.name}')">🗑️</button>
        </div>
      </td>
    </tr>`).join('');

  // Pagination
  const totalPages = Math.ceil(total / PER_PAGE);
  const pag = document.getElementById('pagination');
  pag.innerHTML = '';
  for (let i = 1; i <= totalPages; i++) {
    pag.innerHTML += `<button class="page-btn${i===currentPage?' active':''}" onclick="goPage(${i})">${i}</button>`;
  }
}

function goPage(p) { currentPage = p; renderProducts(); }

function populateModalSelects() {
  const catSel = document.getElementById('pCategory');
  const brSel = document.getElementById('pBrand');
  catSel.innerHTML = '<option value="">Selecione a categoria</option>' +
    categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
  brSel.innerHTML = '<option value="">Selecione a marca</option>' +
    brands.map(b => `<option value="${b.id}">${b.name}</option>`).join('');
}

function openProductModal(id = null) {
  document.getElementById('productModal').classList.add('open');
  clearForm();
  if (!id) document.getElementById('modalTitle').textContent = 'Novo Produto';
}

function closeProductModal() {
  document.getElementById('productModal').classList.remove('open');
}

function clearForm() {
  ['productId','pName','pPrice','pOrigPrice','pStock','pDescription','pSizes','pImages'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.getElementById('pFeatured').checked = false;
  document.getElementById('pPromo').checked = false;
  document.getElementById('pActive').checked = true;
}

async function editProduct(id) {
  const p = allProducts.find(x => x.id === id);
  if (!p) return;
  document.getElementById('modalTitle').textContent = 'Editar Produto';
  document.getElementById('productId').value = p.id;
  document.getElementById('pName').value = p.name;
  document.getElementById('pCategory').value = p.category_id || '';
  document.getElementById('pBrand').value = p.brand_id || '';
  document.getElementById('pPrice').value = p.price;
  document.getElementById('pOrigPrice').value = p.original_price || '';
  document.getElementById('pStock').value = p.stock || 0;
  document.getElementById('pDescription').value = p.description || '';
  document.getElementById('pSizes').value = (p.sizes || []).join(', ');
  document.getElementById('pImages').value = (p.images || []).join('\n');
  document.getElementById('pFeatured').checked = p.is_featured;
  document.getElementById('pPromo').checked = p.is_promotion;
  document.getElementById('pActive').checked = p.is_active;
  document.getElementById('productModal').classList.add('open');
}

async function saveProduct() {
  const id = document.getElementById('productId').value;
  const name = document.getElementById('pName').value.trim();
  const price = parseFloat(document.getElementById('pPrice').value);

  if (!name || isNaN(price)) {
    adminShowToast('⚠️ Preencha nome e preço', 'error');
    return;
  }

  const payload = {
    name,
    slug: name.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '') + '-' + Date.now(),
    category_id: document.getElementById('pCategory').value || null,
    brand_id: document.getElementById('pBrand').value || null,
    price,
    original_price: parseFloat(document.getElementById('pOrigPrice').value) || null,
    stock: parseInt(document.getElementById('pStock').value) || 0,
    description: document.getElementById('pDescription').value || null,
    sizes: document.getElementById('pSizes').value.split(',').map(s => s.trim()).filter(Boolean),
    images: document.getElementById('pImages').value.split('\n').map(s => s.trim()).filter(Boolean),
    is_featured: document.getElementById('pFeatured').checked,
    is_promotion: document.getElementById('pPromo').checked,
    is_active: document.getElementById('pActive').checked
  };

  try {
    let error;
    if (id) {
      delete payload.slug;
      ({ error } = await db.from('products').update(payload).eq('id', id));
    } else {
      ({ error } = await db.from('products').insert(payload));
    }
    if (error) throw error;
    adminShowToast('✅ Produto salvo!', 'success');
    closeProductModal();
    loadProducts();
  } catch (e) {
    adminShowToast('❌ Erro ao salvar: ' + e.message, 'error');
  }
}

async function deleteProduct(id, name) {
  if (!confirm(`Excluir "${name}"?`)) return;
  const { error } = await db.from('products').delete().eq('id', id);
  if (error) { adminShowToast('❌ Erro ao excluir', 'error'); return; }
  adminShowToast('🗑️ Produto excluído', 'info');
  loadProducts();
}

init();
</script>
</body>
</html>
